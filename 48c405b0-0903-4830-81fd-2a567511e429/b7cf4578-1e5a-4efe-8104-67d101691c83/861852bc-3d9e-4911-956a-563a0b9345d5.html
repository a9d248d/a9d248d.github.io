<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Social Post Editor</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --muted:#94a3b8; --accent:#7c3aed; --radius:12px;
      --shadow:0 6px 20px rgba(16,24,40,0.08);
    }
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;margin:0;color:#e6eef8;background:linear-gradient(180deg,#071025 0%,#08121a 100%)}
    header{display:flex;align-items:center;gap:16px;padding:18px 24px}
    h1{font-size:18px;margin:0}
    .app{display:grid;grid-template-columns:420px 1fr;gap:18px;padding:18px;max-width:1200px;margin:12px auto}
    .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    label{min-width:110px;color:var(--muted);font-size:13px;padding-top:6px}
    input[type=text], input[type=url], select, textarea{width:100%;min-height:56px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .toolbar{display:flex;gap:6px;margin-bottom:8px}
    .toolbar button{background:#f8fafc;color:var(--muted);padding:6px;border-radius:8px;border:1px solid #e6edf3;cursor:pointer}
    .tags{display:flex;gap:6px;flex-wrap:wrap;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent}
    .tag{background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px;font-size:13px;cursor:pointer}
    button{background:linear-gradient(180deg,var(--accent),#5b21b6);color:white;padding:8px 12px;border-radius:10px;border:0;cursor:pointer}
    button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    .muted{color:var(--muted)}
    .preview{padding:16px;border-radius:12px;box-shadow:var(--shadow);background:var(--card)}
    .post-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .avatar{width:48px;height:48px;border-radius:999px;overflow:hidden;background:#1e293b;display:flex;align-items:center;justify-content:center;font-weight:bold}
    .username{color:var(--muted);font-size:13px}
    .post-body{white-space:pre-wrap}
    .post-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
    .post-images img{width:100%;border-radius:8px;object-fit:cover}
    footer{padding:12px 24px;text-align:center;color:var(--muted)}
    @media(max-width:980px){.app{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <h1>Edit Post</h1>
    <div class="muted">Live post editor + preview • export/import JSON</div>
  </header>

  <div class="app">
    <!-- Editor Panel -->
    <div class="panel">
      <h2>Compose Post</h2>
      <div class="toolbar">
        <button data-cmd="bold"><b>B</b></button>
        <button data-cmd="italic"><i>I</i></button>
        <button data-cmd="link">🔗</button>
        <button id="clearPost">Clear</button>
      </div>
      <div id="postContent" contenteditable="true" style="min-height:120px;padding:8px;border-radius:8px;border:1px solid #e6edf3;background:transparent"></div>
      <small class="muted">Use the toolbar for formatting. Supports simple HTML.</small>

      <hr style="margin:16px 0;border-color:rgba(255,255,255,0.08)" />

      <label>Images</label>
      <input type="file" id="imageInput" accept="image/*" multiple />
      <div id="imagePreview" class="post-images"></div>
      <button type="button" class="secondary" id="clearImages">Remove All</button>

      <hr style="margin:16px 0;border-color:rgba(255,255,255,0.08)" />

      <label>Hashtags</label>
      <div id="tagContainer" class="tags">
        <input type="text" id="tagInput" placeholder="Add hashtag and press Enter" style="border:0;outline:none;padding:6px;min-width:120px;background:transparent;color:inherit" />
      </div>

      <hr style="margin:16px 0;border-color:rgba(255,255,255,0.08)" />

      <label>Visibility</label>
      <select id="visibility">
        <option value="public">Public</option>
        <option value="followers">Followers only</option>
        <option value="private">Private</option>
      </select>

      <hr style="margin:16px 0;border-color:rgba(255,255,255,0.08)" />

      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="exportJson">Export JSON</button>
        <button id="importJsonBtn" class="secondary">Import JSON</button>
        <input type="file" id="importJson" accept="application/json" style="display:none" />
        <button id="importProfileBtn" class="secondary">Import Profile</button>
        <input type="file" id="importProfile" accept="application/json" style="display:none" />
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="panel">
      <h2>Live Preview</h2>
      <div id="preview" class="preview">
        <div class="post-header">
          <div class="avatar" id="pAvatar">U</div>
          <div>
            <div id="pName">Username</div>
            <div class="username" id="pHandle">@handle</div>
          </div>
        </div>
        <div class="post-body" id="pContent">Write something...</div>
        <div class="post-images" id="pImages"></div>
        <div id="pTags" class="muted small"></div>
        <div class="muted small" id="pVisibility">Public</div>
      </div>
    </div>
  </div>

  <footer>All rights reserved</footer>

  <script>
    const state = {
      authorName: "User Name",
      handle: "username",
      avatarDataUrl: null,
      color: "#7c3aed",
      content: "",
      images: [],
      tags: [],
      visibility: "public"
    };

    const el = id => document.getElementById(id);

    function renderAll(){
      document.documentElement.style.setProperty('--accent', state.color);
      el("pName").textContent = state.authorName;
      el("pHandle").textContent = "@" + state.handle;
      el("pContent").innerHTML = state.content || "Write something...";
      el("pVisibility").textContent = state.visibility[0].toUpperCase() + state.visibility.slice(1);

      const avatar = el("pAvatar");
      if(state.avatarDataUrl){ avatar.style.backgroundImage = `url(${state.avatarDataUrl})`; avatar.style.backgroundSize="cover"; avatar.textContent=""; }
      else { avatar.style.backgroundImage="none"; avatar.textContent = state.authorName[0].toUpperCase(); }

      // tags
      const tagCon = el("tagContainer");
      Array.from(tagCon.querySelectorAll(".tag")).forEach(t=>t.remove());
      state.tags.forEach((t,i)=>{
        const span=document.createElement("span");
        span.className="tag"; span.textContent=t;
        span.addEventListener("click",()=>{state.tags.splice(i,1);renderAll();});
        tagCon.insertBefore(span, el("tagInput"));
      });
      el("pTags").textContent = state.tags.map(t=>"#"+t).join(" ");

      // images
      const prev = el("pImages"); prev.innerHTML="";
      const thumbs = el("imagePreview"); thumbs.innerHTML="";
      state.images.forEach((src,i)=>{
        const img=document.createElement("img"); img.src=src;
        img.addEventListener("click",()=>{state.images.splice(i,1);renderAll();});
        prev.appendChild(img.cloneNode());
        thumbs.appendChild(img);
      });
    }

    renderAll();

    // toolbar
    document.querySelectorAll(".toolbar button[data-cmd]").forEach(b=>{
      b.addEventListener("click",()=>{
        const cmd=b.getAttribute("data-cmd");
        if(cmd==="bold") document.execCommand("bold");
        if(cmd==="italic") document.execCommand("italic");
        if(cmd==="link"){ const url=prompt("Enter URL"); if(url) document.execCommand("createLink",false,url);}
        state.content=el("postContent").innerHTML;
        renderAll();
      });
    });
    el("postContent").addEventListener("input",()=>{state.content=el("postContent").innerHTML;renderAll();});
    el("clearPost").addEventListener("click",()=>{el("postContent").innerHTML="";state.content="";renderAll();});

    // images
    el("imageInput").addEventListener("change",e=>{
      const files=[...e.target.files];
      files.forEach(f=>{
        const r=new FileReader();
        r.onload=ev=>{state.images.push(ev.target.result);renderAll();};
        r.readAsDataURL(f);
      });
    });
    el("clearImages").addEventListener("click",()=>{state.images=[];renderAll();});

    // tags
    el("tagInput").addEventListener("keydown",e=>{
      if(e.key==="Enter"){e.preventDefault();const v=e.target.value.trim();if(v){state.tags.push(v.replace(/^#/,""));e.target.value="";renderAll();}}
    });

    // visibility
    el("visibility").addEventListener("change",e=>{state.visibility=e.target.value;renderAll();});

    // export/import
    el("exportJson").addEventListener("click",()=>{
      const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download=(state.handle||"post")+".json";a.click();
      URL.revokeObjectURL(a.href);
    });
    el("importJsonBtn").addEventListener("click",()=>el("importJson").click());
    el("importJson").addEventListener("change",e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{try{Object.assign(state,JSON.parse(ev.target.result));renderAll();alert("Post imported");}catch{alert("Invalid JSON");}};
      r.readAsText(f);
    });

    // import profile
    el("importProfileBtn").addEventListener("click",()=>el("importProfile").click());
    el("importProfile").addEventListener("change",e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const prof=JSON.parse(ev.target.result);
          state.authorName=prof.displayName||state.authorName;
          state.handle=prof.username||state.handle;
          state.avatarDataUrl=prof.avatarDataUrl||state.avatarDataUrl;
          state.color=prof.color||state.color;
          renderAll();
          alert("Profile imported!");
        }catch{alert("Invalid profile JSON");}
      };
      r.readAsText(f);
    });

    // update state on paste
    el("postContent").addEventListener("paste",()=>setTimeout(()=>{state.content=el("postContent").innerHTML;renderAll();},50));
  </script>
</body>
</html>
