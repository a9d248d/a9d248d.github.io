<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Post Viewer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 2rem;
      color: #1e293b;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    input[type="file"] {
      margin-top: 1rem;
    }

    .post {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: transform 0.15s ease;
    }

    .post:hover {
      transform: translateY(-2px);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
    }

    .author {
      display: flex;
      flex-direction: column;
    }

    .author-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .handle {
      color: #64748b;
      font-size: 0.875rem;
    }

    .content {
      font-size: 1rem;
      line-height: 1.5;
    }

    .images {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .images img {
      max-width: 100%;
      border-radius: 0.5rem;
      object-fit: cover;
    }

    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      background: #e2e8f0;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.875rem;
      color: #334155;
    }

    .visibility {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: 600;
    }

    .accent-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: -1rem;
      margin-bottom: 0.5rem;
    }

  </style>
</head>
<body>
  <header>
    <h1>📄 JSON Post Viewer</h1>
    <p>Select one or more JSON post files to display:</p>
    <input type="file" id="fileInput" multiple accept=".json" />
  </header>

  <main id="postsContainer"></main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const postsContainer = document.getElementById("postsContainer");

    fileInput.addEventListener("change", async (event) => {
      postsContainer.innerHTML = ""; // clear old posts
      const files = Array.from(event.target.files);

      for (const file of files) {
        try {
          const text = await file.text();
          const postData = JSON.parse(text);
          renderPost(postData);
        } catch (error) {
          console.error("Error parsing file:", file.name, error);
          const errorEl = document.createElement("div");
          errorEl.textContent = `⚠️ Error reading ${file.name}`;
          postsContainer.appendChild(errorEl);
        }
      }
    });

    function renderPost(post) {
      const postEl = document.createElement("div");
      postEl.className = "post";

      // Accent bar
      const accent = document.createElement("div");
      accent.className = "accent-bar";
      accent.style.background = post.color || "#0ea5a4";
      postEl.appendChild(accent);

      // Header
      const header = document.createElement("div");
      header.className = "post-header";
      header.innerHTML = `
        <img class="avatar" src="${post.avatarDataUrl || ""}" alt="Avatar" />
        <div class="author">
          <span class="author-name">${post.authorName || "Unknown"}</span>
          <span class="handle">@${post.handle || "unknown"}</span>
        </div>
      `;
      postEl.appendChild(header);

      // Content
      const content = document.createElement("div");
      content.className = "content";
      content.textContent = post.content || "";
      postEl.appendChild(content);

      // Images
      if (post.images && post.images.length > 0) {
        const imgContainer = document.createElement("div");
        imgContainer.className = "images";
        post.images.forEach((src) => {
          const img = document.createElement("img");
          img.src = src;
          imgContainer.appendChild(img);
        });
        postEl.appendChild(imgContainer);
      }

      // Tags
      if (post.tags && post.tags.length > 0) {
        const tagContainer = document.createElement("div");
        tagContainer.className = "tags";
        post.tags.forEach((tag) => {
          const tagEl = document.createElement("span");
          tagEl.className = "tag";
          tagEl.textContent = `#${tag}`;
          tagContainer.appendChild(tagEl);
        });
        postEl.appendChild(tagContainer);
      }

      // Visibility
      const visibility = document.createElement("div");
      visibility.className = "visibility";
      visibility.textContent = post.visibility || "public";
      postEl.appendChild(visibility);

      postsContainer.appendChild(postEl);
    }
  </script>
</body>
</html>
